<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aarav Kapoor animated GitHub profile header</title>
  <desc id="desc">Animated abstract coding dashboard header with moving lines and glowing panels.</desc>
  <style>
    .grid {
      stroke: #d1d5db;
      stroke-opacity: 0.18;
    }

    .line {
      stroke-dasharray: 360;
      stroke-dashoffset: 360;
      animation: draw 5.5s ease-in-out infinite;
    }

    .line.two {
      animation-delay: 0.8s;
    }

    .line.three {
      animation-delay: 1.5s;
    }

    .pulse {
      animation: pulse 3s ease-in-out infinite;
      transform-origin: center;
    }

    .float {
      animation: float 4s ease-in-out infinite;
    }

    .float.slow {
      animation-duration: 5.5s;
      animation-delay: 0.5s;
    }

    .blink {
      animation: blink 1.1s steps(1) infinite;
    }

    @keyframes draw {
      0% { stroke-dashoffset: 360; opacity: 0.15; }
      35% { stroke-dashoffset: 0; opacity: 1; }
      72% { stroke-dashoffset: -360; opacity: 0.35; }
      100% { stroke-dashoffset: -360; opacity: 0.15; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="80" y1="20" x2="1120" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="230" y1="78" x2="924" y2="298" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4"/>
      <stop offset="0.52" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.74 0 0 0 0 0.86 0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>

  <g class="grid">
    <path d="M0 60H1200M0 120H1200M0 180H1200M0 240H1200M0 300H1200"/>
    <path d="M120 0V360M240 0V360M360 0V360M480 0V360M600 0V360M720 0V360M840 0V360M960 0V360M1080 0V360"/>
  </g>

  <g opacity="0.2">
    <circle cx="1040" cy="86" r="148" fill="#38BDF8"/>
    <circle cx="210" cy="274" r="132" fill="#5EEAD4"/>
  </g>

  <g class="float slow">
    <rect x="724" y="68" width="324" height="206" rx="18" fill="#0B1220" fill-opacity="0.72" stroke="#99F6E4" stroke-opacity="0.32"/>
    <rect x="756" y="106" width="92" height="10" rx="5" fill="#5EEAD4"/>
    <rect x="756" y="136" width="214" height="10" rx="5" fill="#E5E7EB" fill-opacity="0.72"/>
    <rect x="756" y="166" width="148" height="10" rx="5" fill="#E5E7EB" fill-opacity="0.5"/>
    <rect x="756" y="196" width="236" height="10" rx="5" fill="#38BDF8" fill-opacity="0.75"/>
    <rect x="756" y="226" width="178" height="10" rx="5" fill="#E5E7EB" fill-opacity="0.42"/>
  </g>

  <g class="float">
    <rect x="154" y="82" width="408" height="188" rx="18" fill="#0B1220" fill-opacity="0.76" stroke="#BAE6FD" stroke-opacity="0.28"/>
    <circle cx="190" cy="116" r="7" fill="#F87171"/>
    <circle cx="214" cy="116" r="7" fill="#FBBF24"/>
    <circle cx="238" cy="116" r="7" fill="#34D399"/>
    <text x="190" y="166" fill="#E5E7EB" font-family="SFMono-Regular, Consolas, monospace" font-size="28">aaravk7k</text>
    <text x="190" y="208" fill="#5EEAD4" font-family="SFMono-Regular, Consolas, monospace" font-size="24">builds useful things</text>
    <rect class="blink" x="478" y="190" width="14" height="30" rx="3" fill="#A7F3D0"/>
  </g>

  <path class="line" d="M84 294C220 190 290 324 426 210C558 100 634 276 766 164C900 50 1014 148 1134 72" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" filter="url(#softGlow)"/>
  <path class="line two" d="M80 96C236 150 316 60 448 132C602 216 716 82 852 154C970 216 1034 176 1134 218" stroke="#99F6E4" stroke-opacity="0.85" stroke-width="3" stroke-linecap="round"/>
  <path class="line three" d="M104 238C218 250 296 146 410 166C548 190 594 300 734 270C864 242 934 292 1088 250" stroke="#7DD3FC" stroke-opacity="0.75" stroke-width="3" stroke-linecap="round"/>

  <g class="pulse" filter="url(#softGlow)">
    <circle cx="884" cy="164" r="8" fill="#A7F3D0"/>
    <circle cx="426" cy="210" r="8" fill="#5EEAD4"/>
    <circle cx="734" cy="270" r="8" fill="#38BDF8"/>
  </g>
</svg>
