<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aarav Kapoor AI builder animated aura header</title>
  <desc id="desc">An animated profile banner with aurora light, orbiting project nodes, and a terminal-style AI product builder label.</desc>
  <style>
    .scan {
      animation: scan 5s linear infinite;
    }

    .glow {
      animation: glow 3.4s ease-in-out infinite;
    }

    .glow.delay {
      animation-delay: 1.1s;
    }

    .orbit {
      animation: orbit 12s linear infinite;
      transform-origin: 600px 210px;
    }

    .orbit.rev {
      animation-direction: reverse;
      animation-duration: 16s;
    }

    .spark {
      animation: spark 2.8s ease-in-out infinite;
      transform-origin: center;
    }

    .spark.two {
      animation-delay: 0.7s;
    }

    .spark.three {
      animation-delay: 1.35s;
    }

    .typebar {
      animation: typebar 1s steps(1) infinite;
    }

    .wave {
      stroke-dasharray: 540;
      stroke-dashoffset: 540;
      animation: draw 6s ease-in-out infinite;
    }

    .wave.two {
      animation-delay: 1.3s;
    }

    @keyframes scan {
      0% { transform: translateX(-420px); opacity: 0; }
      15% { opacity: 0.58; }
      55% { opacity: 0.3; }
      100% { transform: translateX(1220px); opacity: 0; }
    }

    @keyframes glow {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.06); }
    }

    @keyframes orbit {
      to { transform: rotate(360deg); }
    }

    @keyframes spark {
      0%, 100% { opacity: 0.35; transform: scale(0.82); }
      50% { opacity: 1; transform: scale(1.18); }
    }

    @keyframes typebar {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }

    @keyframes draw {
      0% { stroke-dashoffset: 540; opacity: 0.08; }
      35% { stroke-dashoffset: 0; opacity: 0.9; }
      75% { stroke-dashoffset: -540; opacity: 0.35; }
      100% { stroke-dashoffset: -540; opacity: 0.08; }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="120" y1="18" x2="1080" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111E"/>
      <stop offset="0.38" stop-color="#102A43"/>
      <stop offset="0.68" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="aura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(598 194) rotate(90) scale(250 470)">
      <stop stop-color="#E0F2FE" stop-opacity="0.7"/>
      <stop offset="0.34" stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="0.67" stop-color="#5EEAD4" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5EEAD4" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#BAE6FD" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5EEAD4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="90" y1="72" x2="1094" y2="342" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A7F3D0"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="blurGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.82 0 0 0 0 0.91 0 0 0 0.8 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="26" fill="url(#aura)"/>

  <g opacity="0.18" stroke="#E5E7EB">
    <path d="M0 70H1200M0 140H1200M0 210H1200M0 280H1200M0 350H1200"/>
    <path d="M100 0V420M200 0V420M300 0V420M400 0V420M500 0V420M600 0V420M700 0V420M800 0V420M900 0V420M1000 0V420M1100 0V420"/>
  </g>

  <rect class="scan" x="0" y="0" width="260" height="420" fill="url(#beam)" opacity="0.42"/>

  <path class="wave" d="M76 318C214 214 276 358 422 230C564 106 654 298 802 166C944 40 1024 160 1132 86" stroke="url(#line)" stroke-width="5" stroke-linecap="round" filter="url(#blurGlow)"/>
  <path class="wave two" d="M68 118C230 180 306 56 460 144C606 226 716 76 870 168C990 238 1056 190 1134 234" stroke="#BAE6FD" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <g filter="url(#blurGlow)">
    <circle class="glow" cx="246" cy="278" r="74" fill="#22D3EE" fill-opacity="0.22"/>
    <circle class="glow delay" cx="960" cy="114" r="82" fill="#A7F3D0" fill-opacity="0.18"/>
  </g>

  <g class="orbit" opacity="0.92">
    <circle cx="600" cy="52" r="7" fill="#FDE68A"/>
    <circle cx="758" cy="210" r="6" fill="#5EEAD4"/>
    <circle cx="600" cy="368" r="7" fill="#38BDF8"/>
    <circle cx="442" cy="210" r="6" fill="#A7F3D0"/>
  </g>

  <g class="orbit rev" opacity="0.8">
    <circle cx="516" cy="86" r="5" fill="#E0F2FE"/>
    <circle cx="842" cy="210" r="5" fill="#FDE68A"/>
    <circle cx="516" cy="334" r="5" fill="#5EEAD4"/>
    <circle cx="358" cy="210" r="5" fill="#38BDF8"/>
  </g>

  <g transform="translate(118 84)">
    <rect width="452" height="236" rx="20" fill="#020617" fill-opacity="0.72" stroke="#BAE6FD" stroke-opacity="0.24"/>
    <circle cx="36" cy="36" r="7" fill="#F87171"/>
    <circle cx="62" cy="36" r="7" fill="#FBBF24"/>
    <circle cx="88" cy="36" r="7" fill="#34D399"/>
    <text x="36" y="90" fill="#E5E7EB" font-family="SFMono-Regular, Consolas, monospace" font-size="25">aaravk7k</text>
    <text x="36" y="130" fill="#5EEAD4" font-family="SFMono-Regular, Consolas, monospace" font-size="24">AI product builder</text>
    <text x="36" y="170" fill="#93C5FD" font-family="SFMono-Regular, Consolas, monospace" font-size="20">TypeScript / Python / UX</text>
    <rect class="typebar" x="334" y="150" width="13" height="28" rx="3" fill="#FDE68A"/>
  </g>

  <g transform="translate(686 88)">
    <rect width="396" height="244" rx="20" fill="#020617" fill-opacity="0.64" stroke="#A7F3D0" stroke-opacity="0.22"/>
    <text x="34" y="56" fill="#E5E7EB" font-family="SFMono-Regular, Consolas, monospace" font-size="20">current top projects</text>
    <rect x="34" y="82" width="248" height="36" rx="18" fill="#2563EB" fill-opacity="0.28" stroke="#60A5FA" stroke-opacity="0.5"/>
    <text x="54" y="106" fill="#DBEAFE" font-family="SFMono-Regular, Consolas, monospace" font-size="17">music-ai</text>
    <rect x="34" y="132" width="300" height="36" rx="18" fill="#0F766E" fill-opacity="0.35" stroke="#5EEAD4" stroke-opacity="0.5"/>
    <text x="54" y="156" fill="#CCFBF1" font-family="SFMono-Regular, Consolas, monospace" font-size="17">investor-swipe</text>
    <rect x="34" y="182" width="278" height="36" rx="18" fill="#B45309" fill-opacity="0.28" stroke="#FDE68A" stroke-opacity="0.5"/>
    <text x="54" y="206" fill="#FEF3C7" font-family="SFMono-Regular, Consolas, monospace" font-size="17">hotel-ai-agent</text>
  </g>

  <g filter="url(#blurGlow)">
    <circle class="spark" cx="612" cy="208" r="9" fill="#FDE68A"/>
    <circle class="spark two" cx="632" cy="184" r="5" fill="#5EEAD4"/>
    <circle class="spark three" cx="580" cy="236" r="6" fill="#38BDF8"/>
  </g>
</svg>
