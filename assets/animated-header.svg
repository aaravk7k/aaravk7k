<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aarav Kapoor executive noir AI builder banner</title>
  <desc id="desc">Original executive noir introductory banner with black marble, ivory suit silhouette, city skyline, and crimson project accents.</desc>
  <style>
    .scan { animation: scan 5s ease-in-out infinite; }
    .city { animation: city 4s ease-in-out infinite; }
    .cane { animation: cane 3.2s ease-in-out infinite; transform-origin: 824px 248px; }
    .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
    .line { stroke-dasharray: 460; stroke-dashoffset: 460; animation: line 5s ease-in-out infinite; }
    .line.two { animation-delay: 1.2s; }
    .card { animation: card 4s ease-in-out infinite; }
    .card.two { animation-delay: .8s; }
    .typing { animation: typing 1s steps(1) infinite; }

    @keyframes scan {
      0%, 100% { transform: translateX(-360px); opacity: 0; }
      18% { opacity: .38; }
      82% { opacity: .12; }
    }

    @keyframes city {
      0%, 100% { opacity: .3; }
      50% { opacity: .68; }
    }

    @keyframes cane {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-2deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: .42; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    @keyframes line {
      0% { stroke-dashoffset: 460; opacity: .08; }
      38% { stroke-dashoffset: 0; opacity: .8; }
      76% { stroke-dashoffset: -460; opacity: .24; }
      100% { stroke-dashoffset: -460; opacity: .08; }
    }

    @keyframes card {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    @keyframes typing {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset=".44" stop-color="#18181B"/>
      <stop offset=".74" stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#270606"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(680 210) rotate(90) scale(260 430)">
      <stop stop-color="#FAFAFA" stop-opacity=".38"/>
      <stop offset=".3" stop-color="#E4E4E7" stop-opacity=".18"/>
      <stop offset=".74" stop-color="#991B1B" stop-opacity=".1"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crimson" x1="180" y1="50" x2="1010" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCA5A5"/>
      <stop offset=".42" stop-color="#991B1B"/>
      <stop offset="1" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FAFAFA" stop-opacity="0"/>
      <stop offset=".5" stop-color="#FAFAFA" stop-opacity=".54"/>
      <stop offset="1" stop-color="#991B1B" stop-opacity="0"/>
    </linearGradient>
    <pattern id="marble" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M-20 92C24 36 74 136 126 62C168 2 198 74 222 30" stroke="#FAFAFA" stroke-opacity=".055" stroke-width="2" fill="none"/>
      <path d="M-12 132C48 102 78 186 150 112C184 78 214 96 246 70" stroke="#991B1B" stroke-opacity=".08" stroke-width="2" fill="none"/>
    </pattern>
    <filter id="softGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .82 0 0 0 0 .08 0 0 0 0 .08 0 0 0 .72 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="430" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="430" rx="24" fill="url(#marble)"/>
  <rect width="1200" height="430" rx="24" fill="url(#spotlight)"/>

  <g class="city" fill="#080808" stroke="#52525B" stroke-opacity=".32">
    <rect x="0" y="292" width="76" height="138"/>
    <rect x="92" y="250" width="58" height="180"/>
    <rect x="170" y="314" width="86" height="116"/>
    <rect x="278" y="232" width="74" height="198"/>
    <rect x="374" y="288" width="68" height="142"/>
    <rect x="1000" y="276" width="68" height="154"/>
    <rect x="1084" y="230" width="56" height="200"/>
    <rect x="1158" y="310" width="54" height="120"/>
  </g>

  <rect class="scan" x="0" y="0" width="260" height="430" fill="url(#beam)" opacity=".36"/>

  <g transform="translate(110 82)" class="card">
    <rect width="430" height="250" rx="14" fill="#09090B" fill-opacity=".84" stroke="#A1A1AA" stroke-opacity=".28"/>
    <text x="34" y="62" fill="#F5F5F5" font-family="SFMono-Regular, Consolas, monospace" font-size="18">INTRODUCTION</text>
    <text x="34" y="112" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">Aarav Kapoor</text>
    <text x="34" y="154" fill="#FCA5A5" font-family="SFMono-Regular, Consolas, monospace" font-size="21">AI Product Builder</text>
    <text x="34" y="194" fill="#D4D4D8" font-family="SFMono-Regular, Consolas, monospace" font-size="18">TypeScript / Python / UX</text>
    <rect class="typing" x="296" y="173" width="12" height="25" rx="2" fill="#991B1B"/>
  </g>

  <g transform="translate(748 92)" class="card two">
    <rect width="340" height="222" rx="14" fill="#09090B" fill-opacity=".8" stroke="#991B1B" stroke-opacity=".42"/>
    <text x="28" y="52" fill="#F5F5F5" font-family="SFMono-Regular, Consolas, monospace" font-size="17">CURRENT BUILDS</text>
    <rect x="28" y="78" width="214" height="34" rx="6" fill="#18181B" stroke="#991B1B" stroke-opacity=".48"/>
    <text x="44" y="101" fill="#F5F5F5" font-family="SFMono-Regular, Consolas, monospace" font-size="16">music-ai</text>
    <rect x="28" y="126" width="274" height="34" rx="6" fill="#18181B" stroke="#A1A1AA" stroke-opacity=".36"/>
    <text x="44" y="149" fill="#E4E4E7" font-family="SFMono-Regular, Consolas, monospace" font-size="16">investor-swipe</text>
    <rect x="28" y="174" width="250" height="34" rx="6" fill="#18181B" stroke="#991B1B" stroke-opacity=".48"/>
    <text x="44" y="197" fill="#FCA5A5" font-family="SFMono-Regular, Consolas, monospace" font-size="16">hotel-ai-agent</text>
  </g>

  <g transform="translate(600 216)" filter="url(#softGlow)">
    <path d="M-54 130C-30 74 -32 28 -24 -26C-10 -54 10 -54 24 -26C32 28 30 74 54 130H-54Z" fill="#F5F5F5" stroke="#A1A1AA" stroke-opacity=".5" stroke-width="2"/>
    <path d="M-24 18C-6 32 6 32 24 18L18 130H-18L-24 18Z" fill="#18181B"/>
    <path d="M-9 34L0 48L9 34" stroke="#991B1B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="-48" r="38" fill="#0A0A0A" stroke="#F5F5F5" stroke-opacity=".38" stroke-width="2"/>
    <path d="M-20 -50C-8 -58 8 -58 20 -50" stroke="#F5F5F5" stroke-width="3" stroke-linecap="round"/>
    <path d="M-18 -35H18" stroke="#991B1B" stroke-opacity=".7" stroke-width="3" stroke-linecap="round"/>
    <circle class="pulse" cx="0" cy="-48" r="58" stroke="#991B1B" stroke-opacity=".48" stroke-width="2" fill="none"/>
  </g>

  <g class="cane" filter="url(#softGlow)">
    <path d="M826 132C864 122 878 156 844 170" stroke="#F5F5F5" stroke-width="8" stroke-linecap="round"/>
    <path d="M842 170L812 362" stroke="#F5F5F5" stroke-width="8" stroke-linecap="round"/>
    <circle cx="826" cy="132" r="10" fill="#991B1B"/>
  </g>

  <path class="line" d="M72 354C224 236 316 374 472 250C616 136 708 312 846 196C962 98 1034 166 1132 98" stroke="url(#crimson)" stroke-width="4" stroke-linecap="round" filter="url(#softGlow)"/>
  <path class="line two" d="M74 118C210 176 310 72 456 148C610 230 744 84 900 170C1018 236 1080 200 1132 248" stroke="#F5F5F5" stroke-opacity=".7" stroke-width="2" stroke-linecap="round"/>

  <g opacity=".24">
    <rect x="0" y="0" width="1200" height="430" rx="24" stroke="#F5F5F5" stroke-width="2"/>
    <path d="M0 18H1200M0 412H1200" stroke="#991B1B" stroke-width="2"/>
  </g>
</svg>
